<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Mix · Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --verde:#99CC0F; --vinho:#8F1245; --pink:#BF195D; --azul:#041F40; --bege:#E5D4C3;
  --bg:#F2F2F2; --card:#FFFFFF; --txt:#1a1a1a; --muted:#6B7280; --line:#E5E7EB;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:84px;}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;}
.header-logo{height:34px;object-fit:contain;}
.header-right{margin-left:auto;text-align:right;}
.header-date-label{font-size:9px;color:#9CA3AF;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.header-date-val{font-size:14px;font-weight:700;}

/* CONTENT */
.content{padding:14px;}
.page-title{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;color:var(--azul);margin-bottom:2px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}

/* CARDS RESUMO */
.summary{display:grid;gap:10px;margin-bottom:16px;}
.cols-2{grid-template-columns:1fr 1fr;}
.cols-3{grid-template-columns:1fr 1fr 1fr;}
.stat-card{background:var(--card);border-radius:14px;padding:13px 14px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid var(--vinho);}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.stat-val{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.5px;}

/* ALERTAS */
.alert-box{background:#FFF5F5;border-left:4px solid #EF4444;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.alert-title{font-size:12px;font-weight:700;color:#991B1B;margin-bottom:4px;}
.alert-item{font-size:12px;color:#7F1D1D;padding:3px 0;}
.ok-box{background:#F0FDF4;border-left:4px solid var(--verde);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:12px;color:#166534;font-weight:600;}

/* LANÇAMENTO CARD */
.lanc-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid var(--vinho);}
.lanc-card.pago{border-left-color:var(--verde);}
.lanc-card.vencido{border-left-color:#EF4444;}
.lanc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.lanc-forn{font-weight:700;font-size:14px;line-height:1.3;}
.lanc-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.lanc-dre{font-size:10px;color:var(--vinho);font-weight:600;margin-top:3px;}
.tag-cf{background:rgba(4,31,64,.1);color:var(--azul);font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;vertical-align:middle;}
.tag-presumido{display:inline-block;background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:4px;}
.tag-semdoc{display:inline-block;background:#FEE2E2;color:#991B1B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:4px;margin-left:4px;}
.lanc-val{font-weight:800;font-size:15px;color:var(--azul);white-space:nowrap;}
.lanc-val.neg{color:#166534;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:5px;}
.badge .dot{width:5px;height:5px;border-radius:50%;}
.b-aberto{background:#FFF3CD;color:#856404;} .b-aberto .dot{background:#F59E0B;}
.b-pago{background:#D1FAE5;color:#065F46;} .b-pago .dot{background:#10B981;}
.b-vencido{background:#FEE2E2;color:#991B1B;} .b-vencido .dot{background:#EF4444;}

/* FILTROS */
.filtros{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.filtro-chip{padding:7px 14px;border-radius:99px;border:2px solid var(--line);background:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;}
.filtro-chip.active{background:var(--vinho);color:#fff;border-color:var(--vinho);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--vinho);display:flex;padding:8px 0 20px;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bnav-icon{font-size:19px;line-height:1;}
.bnav-lbl{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.3px;}
.bnav-item.active .bnav-lbl{color:var(--verde);}

/* LOADING / MSG */
.msg-center{text-align:center;padding:50px 20px;}
.loading-txt{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--vinho);letter-spacing:2px;}
.error-box{background:#FEE2E2;border-radius:12px;padding:14px 16px;color:#991B1B;font-size:13px;font-weight:600;}
.empty{text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px;}
.rodape{margin-top:22px;text-align:center;font-size:9px;color:#C0B8B3;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}

/* PEDIDOS */
.btn-novo{width:100%;padding:13px;border-radius:12px;border:none;background:var(--verde);color:var(--azul);font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:14px;}
.ped-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.ped-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
.ped-forn{font-weight:700;font-size:14px;line-height:1.3;}
.ped-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.ped-val{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--azul);white-space:nowrap;}
.ped-forma{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:4px;}
.forma-pix{background:rgba(153,204,15,.2);color:#4D7C0F;}
.forma-boleto{background:rgba(4,31,64,.1);color:var(--azul);}
.forma-dinheiro{background:rgba(191,25,93,.12);color:var(--pink);}
.progress-bar{height:6px;background:#F3F4F6;border-radius:99px;margin:10px 0;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:var(--verde);transition:width .4s;}
.ped-pct{font-size:11px;font-weight:700;color:var(--muted);text-align:right;margin-bottom:8px;}
.checks{display:flex;flex-direction:column;gap:6px;}
.check-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 10px;background:#F9FAFB;border-radius:9px;}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid #D1D5DB;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff;transition:all .2s;}
.check-box.on{background:var(--verde);border-color:var(--verde);}
.check-lbl{font-size:12px;color:#9CA3AF;font-weight:500;}
.check-lbl.on{color:var(--txt);font-weight:600;}
.ped-done{background:rgba(153,204,15,.1);border:1px solid var(--verde);}
.check-row-wrap{width:100%;}
.up-btn{background:var(--verde);color:var(--azul);font-weight:700;font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ver-link{background:#F0FDF4;color:#166534;font-weight:700;font-size:11px;padding:5px 10px;border-radius:7px;text-decoration:none;border:1px solid var(--verde);white-space:nowrap;flex-shrink:0;}
.forma-seletor{background:#F9FAFB;border-radius:10px;padding:12px;text-align:center;}
.forma-seletor-lbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;}
.forma-opts{display:flex;gap:8px;}
.forma-opt{flex:1;padding:10px;border-radius:9px;border:2px solid var(--vinho);background:#fff;color:var(--vinho);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
.forma-opt:active{background:var(--vinho);color:#fff;}
.ped-del{background:none;border:none;cursor:pointer;font-size:15px;color:#D1D5DB;margin-top:6px;padding:2px;}
.acao-btns{display:flex;gap:8px;margin-bottom:14px;}
.btn-acao{flex:1;padding:12px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-weight:800;font-size:13px;cursor:pointer;}
.btn-acao.verde{background:var(--verde);color:var(--azul);}
.btn-acao.escuro{background:var(--azul);color:#fff;}

/* FREELANCERS */
.fl-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06);cursor:pointer;}
.fl-head{display:flex;justify-content:space-between;align-items:center;}
.fl-nome{font-weight:800;font-size:17px;color:var(--azul);}
.fl-tipo-resumo{font-size:11px;color:var(--muted);margin-top:2px;}
.fl-saldo-wrap{text-align:right;}
.fl-saldo-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.fl-saldo{font-family:'Bebas Neue',cursive;font-size:24px;line-height:1;}
.fl-saldo.deve-empresa{color:#166534;}
.fl-saldo.deve-freela{color:#991B1B;}
.fl-saldo.zero{color:var(--muted);}
.fl-saldo-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:4px;}
.tag-emp{background:#D1FAE5;color:#065F46;}
.tag-fre{background:#FEE2E2;color:#991B1B;}
.tag-ok{background:#F3F4F6;color:#6B7280;}
.fl-back{font-size:13px;color:var(--vinho);font-weight:700;cursor:pointer;margin-bottom:10px;}
.fl-btns{display:flex;gap:8px;margin-bottom:16px;}
.fl-btns button{flex:1;padding:11px 4px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-weight:800;font-size:13px;cursor:pointer;}
.fl-btn-d{background:#D1FAE5;color:#065F46;}
.fl-btn-a{background:#FEE2E2;color:#991B1B;}
.fl-btn-c{background:#FEF3C7;color:#92400E;}
.fl-secao{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.fl-secao-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fl-secao-tit{font-weight:800;font-size:14px;color:var(--azul);}
.fl-secao-tot{font-weight:800;font-size:14px;color:var(--azul);}
.fl-vazio{font-size:12px;color:#9CA3AF;padding:6px 0;font-style:italic;}
.fl-linha{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F3F4F6;cursor:pointer;}
.fl-linha-desc{font-weight:600;font-size:13px;}
.fl-linha-data{font-size:10px;color:var(--muted);}
.fl-linha-dir{display:flex;align-items:center;gap:8px;}
.fl-linha-val{font-weight:700;font-size:13px;}
.fl-apagar{margin-top:8px;font-size:12px;color:#92400E;text-align:right;}
.pago-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.pg-sim{background:#D1FAE5;color:#065F46;}
.pg-nao{background:#FFF3CD;color:#856404;}
.fl-total{background:var(--azul);border-radius:14px;padding:18px;text-align:center;margin-bottom:12px;}
.fl-total-formula{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:8px;}
.fl-total-formula b{color:#fff;}
.fl-total-val{font-family:'Bebas Neue',cursive;font-size:34px;line-height:1;}
.fl-total-val.deve-empresa{color:var(--verde);}
.fl-total-val.deve-freela{color:#FCA5A5;}
.fl-total-val.zero{color:rgba(255,255,255,.6);}
.fl-total-lbl{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;margin-top:4px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:22px 18px 30px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--azul);letter-spacing:1px;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 12px;border-radius:10px;border:2px solid var(--line);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:#fff;}
.modal-btns{display:flex;gap:10px;margin-top:6px;}
.modal-btns button{flex:1;padding:13px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-weight:800;font-size:14px;cursor:pointer;}
.btn-cancel{background:#F3F4F6;color:var(--muted);}
.btn-save{background:var(--verde);color:var(--azul);}
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="https://qlcgjpaglyygnnkubxks.supabase.co/storage/v1/object/public/Bubble%20Mix%20Boulevard/logo.png" alt="Bubble Mix">
  <div class="header-right">
    <div class="header-date-label">Hoje</div>
    <div class="header-date-val" id="hoje-txt">—</div>
  </div>
</div>

<div class="content" id="content">
  <div class="msg-center"><div class="loading-txt">Carregando...</div></div>
</div>

<nav class="bnav">
  <button class="bnav-item active" data-tab="home" onclick="nav('home',this)"><span class="bnav-icon">🏠</span><span class="bnav-lbl">Home</span></button>
  <button class="bnav-item" data-tab="pagar" onclick="nav('pagar',this)"><span class="bnav-icon">💰</span><span class="bnav-lbl">A Pagar</span></button>
  <button class="bnav-item" data-tab="pedidos" onclick="nav('pedidos',this)"><span class="bnav-icon">📦</span><span class="bnav-lbl">Pedidos</span></button>
  <button class="bnav-item" data-tab="pessoas" onclick="nav('pessoas',this)"><span class="bnav-icon">👥</span><span class="bnav-lbl">Pessoas</span></button>
  <button class="bnav-item" data-tab="dre" onclick="nav('dre',this)"><span class="bnav-icon">📊</span><span class="bnav-lbl">DRE</span></button>
</nav>

<script>
const SUPA="https://qlcgjpaglyygnnkubxks.supabase.co/rest/v1";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsY2dqcGFnbHl5Z25ua3VieGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjIzNTAsImV4cCI6MjA5NDc5ODM1MH0.B6ie_CSlXcLYsfcnyboxPSuYmDIDcb4OcYGLz_p1Dno";
const H={apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};

function fmt(v){var n=Number(v||0);return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function fmtDate(d){if(!d)return "—";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function hojeISO(){return new Date().toISOString().split("T")[0];}
function isVencido(data,status){if(status==="Pago")return false;if(!data)return false;return data<hojeISO();}

async function api(tabela,query){
  var r=await fetch(SUPA+"/"+tabela+"?"+query,{headers:H});
  if(!r.ok)throw new Error("Erro "+r.status+" em "+tabela);
  return await r.json();
}

var filtroPagar="todos";

function nav(tab,btn){
  document.querySelectorAll(".bnav-item").forEach(function(b){b.classList.remove("active");});
  if(btn)btn.classList.add("active");
  render(tab);
}

async function render(tab){
  var c=document.getElementById("content");
  c.innerHTML='<div class="msg-center"><div class="loading-txt">Carregando...</div></div>';
  try{
    if(tab==="home")await renderHome(c);
    else if(tab==="pagar")await renderPagar(c);
    else if(tab==="pedidos")await renderPedidos(c);
    else if(tab==="pessoas")await renderPessoas(c);
    else c.innerHTML='<div class="empty">Módulo em construção.<br>Vamos montar este depois.</div>';
  }catch(e){
    c.innerHTML='<div class="error-box">⚠️ '+e.message+'</div>';
  }
}

/* ===== HOME ===== */
async function renderHome(c){
  var hoje=hojeISO();
  var seteDias=new Date(Date.now()+7*864e5).toISOString().split("T")[0];
  var lancs=await api("lancamentos","status=eq.Em aberto&select=fornecedor,valor,data,competencia&order=data.asc");
  var aPagar7=lancs.filter(function(l){return l.data&&l.data<=seteDias;});
  var vencidos=lancs.filter(function(l){return l.data&&l.data<hoje;});
  var totalAberto=lancs.reduce(function(s,l){return s+Number(l.valor||0);},0);
  var total7=aPagar7.reduce(function(s,l){return s+Number(l.valor||0);},0);

  var frees=await api("freelancers","pago=eq.false&select=freelancer,valor,tipo");
  var freePend=frees.filter(function(f){return f.tipo==="diaria";});

  var html='<div class="page-title">Resumo</div><div class="page-sub">Bubble Mix Boulevard · Loja 22A</div>';

  // Alertas
  if(vencidos.length>0){
    html+='<div class="alert-box"><div class="alert-title">⚠️ '+vencidos.length+' conta(s) vencida(s)</div>';
    vencidos.slice(0,4).forEach(function(l){html+='<div class="alert-item">'+l.fornecedor+' · '+fmt(l.valor)+' · venceu '+fmtDate(l.data)+'</div>';});
    html+='</div>';
  }else{
    html+='<div class="ok-box">✅ Nenhuma conta vencida</div>';
  }

  // Cards
  html+='<div class="summary cols-2">';
  html+='<div class="stat-card" style="border-color:#8F1245"><div class="stat-label">A pagar (7 dias)</div><div class="stat-val" style="color:#8F1245">'+fmt(total7)+'</div></div>';
  html+='<div class="stat-card" style="border-color:#041F40"><div class="stat-label">Total em aberto</div><div class="stat-val" style="color:#041F40">'+fmt(totalAberto)+'</div></div>';
  html+='</div>';

  html+='<div class="summary cols-2">';
  html+='<div class="stat-card" style="border-color:#99CC0F"><div class="stat-label">Freelancers a pagar</div><div class="stat-val" style="color:#4D7C0F">'+freePend.length+'</div></div>';
  html+='<div class="stat-card" style="border-color:#BF195D"><div class="stat-label">Contas em aberto</div><div class="stat-val" style="color:#BF195D">'+lancs.length+'</div></div>';
  html+='</div>';

  html+='<div class="rodape">Bubble Mix Tea · Boulevard Londrina</div>';
  c.innerHTML=html;
}

/* ===== CONTAS A PAGAR ===== */
async function renderPagar(c){
  var lancs=await api("lancamentos","select=id,data,data_pagamento,fornecedor,descricao,valor,linha_dre,competencia,status,forma_pagamento,numero_nf,custo_fixo_id,url_nf,url_boleto,url_comprovante&order=data.desc&limit=300");

  var totalAberto=lancs.filter(function(l){return l.status==="Em aberto";}).reduce(function(s,l){return s+Number(l.valor||0);},0);
  var pagos=lancs.filter(function(l){return l.status==="Pago";}).length;

  var html='<div class="page-title">Contas a Pagar</div><div class="page-sub">'+lancs.length+' lançamentos</div>';

  html+='<div class="summary cols-3">';
  html+='<div class="stat-card" style="border-color:#8F1245"><div class="stat-label">Em aberto</div><div class="stat-val" style="color:#8F1245">'+fmt(totalAberto)+'</div></div>';
  html+='<div class="stat-card" style="border-color:#041F40"><div class="stat-label">Total</div><div class="stat-val" style="color:#041F40">'+lancs.length+'</div></div>';
  html+='<div class="stat-card" style="border-color:#4D7C0F"><div class="stat-label">Pagos</div><div class="stat-val" style="color:#4D7C0F">'+pagos+'</div></div>';
  html+='</div>';

  // Botoes de acao
  html+='<div class="acao-btns">';
  html+='<button class="btn-acao verde" onclick="abrirModalLancamento()">+ Lançamento</button>';
  html+='<button class="btn-acao escuro" onclick="gerarCustosFixos()">⚙️ Gerar custos fixos</button>';
  html+='</div>';

  // Filtros
  var filtros=[["todos","Todos"],["aberto","Em aberto"],["vencido","Vencidos"],["pago","Pagos"],["semdoc","Falta comprovante"]];
  html+='<div class="filtros">';
  filtros.forEach(function(f){
    html+='<button class="filtro-chip '+(filtroPagar===f[0]?"active":"")+'" onclick="setFiltroPagar(\''+f[0]+'\')">'+f[1]+'</button>';
  });
  html+='</div>';

  // Lista filtrada
  var lista=lancs.filter(function(l){
    var v=isVencido(l.data,l.status);
    var temDoc=l.url_comprovante||l.url_boleto||l.url_nf;
    if(filtroPagar==="aberto")return l.status==="Em aberto"&&!v;
    if(filtroPagar==="vencido")return v;
    if(filtroPagar==="pago")return l.status==="Pago";
    if(filtroPagar==="semdoc")return l.status==="Pago"&&!temDoc;
    return true;
  });

  if(lista.length===0){
    html+='<div class="empty">Nenhum lançamento neste filtro.</div>';
  }else{
    window._lancCache={};
    lista.forEach(function(l){
      window._lancCache[l.id]=l;
      var v=isVencido(l.data,l.status);
      var cls=v?"vencido":(l.status==="Pago"?"pago":"");
      var bdg=v?'<span class="badge b-vencido"><span class="dot"></span>Vencido</span>':(l.status==="Pago"?'<span class="badge b-pago"><span class="dot"></span>Pago</span>':'<span class="badge b-aberto"><span class="dot"></span>Em aberto</span>');
      var neg=Number(l.valor)<0?"neg":"";
      var presumido=(l.descricao||"").toLowerCase().indexOf("valor presumido")>=0;
      var semValor=(l.valor==null||Number(l.valor)===0);
      var temDoc=l.url_comprovante||l.url_boleto||l.url_nf;
      var pagoSemDoc=(l.status==="Pago"&&!temDoc);
      html+='<div class="lanc-card '+cls+'" onclick="abrirBaixa('+l.id+')">';
      html+='<div class="lanc-top"><div style="flex:1;min-width:0;">';
      html+='<div class="lanc-forn">'+(l.fornecedor||l.descricao||"—")+(l.custo_fixo_id?' <span class="tag-cf">fixo</span>':'')+'</div>';
      html+='<div class="lanc-meta">'+fmtDate(l.data)+' · '+(l.competencia||"—")+(l.forma_pagamento?' · '+l.forma_pagamento:'')+'</div>';
      if(l.linha_dre)html+='<div class="lanc-dre">'+l.linha_dre+'</div>';
      if(presumido)html+='<span class="tag-presumido">⚠️ valor presumido</span>';
      else if(semValor&&l.custo_fixo_id)html+='<span class="tag-presumido">⚠️ preencher valor</span>';
      if(pagoSemDoc)html+='<span class="tag-semdoc">📎 falta comprovante</span>';
      html+='</div><div style="text-align:right;"><div class="lanc-val '+neg+'">'+(semValor?'—':fmt(l.valor))+'</div>'+bdg+'</div>';
      html+='</div></div>';
    });
  }

  html+='<div class="rodape">Bubble Mix Tea · Boulevard Londrina</div>';
  c.innerHTML=html;
}

// Cada check: [campo_check, label, tipo_documento_ou_null, campo_url]
function checksDoFluxo(forma){
  if(forma==="Boleto")return [
    ["check_nf_recebida","NF recebida","nf","url_nf"],
    ["check_pedido_chegou","Mercadoria chegou",null,null],
    ["check_comprovante_recebido","Comprovante (pago)","comprovante","url_comprovante"],
    ["check_baixa_alo_chefia","Abastecer Alo Chefia",null,null]
  ];
  if(forma==="Dinheiro")return [
    ["check_nf_recebida","NF recebida","nf","url_nf"],
    ["check_pedido_chegou","Mercadoria chegou",null,null],
    ["check_baixa_alo_chefia","Abastecer Alo Chefia",null,null]
  ];
  // Pix: paga na hora
  return [
    ["check_comprovante_recebido","Comprovante (pago)","comprovante","url_comprovante"],
    ["check_nf_recebida","NF recebida","nf","url_nf"],
    ["check_pedido_chegou","Mercadoria chegou",null,null],
    ["check_baixa_alo_chefia","Abastecer Alo Chefia",null,null]
  ];
}

async function renderPedidos(c){
  var peds=await api("pedidos","select=*&order=data_pedido.desc");
  var abertos=peds.filter(function(p){return !p.check_baixa_alo_chefia;}).length;

  var html='<div class="page-title">Pedidos</div><div class="page-sub">'+peds.length+' pedidos · '+abertos+' em andamento</div>';
  html+='<button class="btn-novo" onclick="abrirModalPedido()">+ Novo Pedido</button>';

  if(peds.length===0){
    html+='<div class="empty">Nenhum pedido ainda.<br>Toque em "Novo Pedido" para começar.</div>';
  }else{
    peds.forEach(function(p){
      var checks=checksDoFluxo(p.forma_pagamento);
      var feitos=checks.filter(function(ch){return p[ch[0]];}).length;
      var pct=Math.round(feitos/checks.length*100);
      var done=feitos===checks.length;
      var formaCls=p.forma_pagamento==="Boleto"?"forma-boleto":(p.forma_pagamento==="Dinheiro"?"forma-dinheiro":"forma-pix");

      html+='<div class="ped-card'+(done?' ped-done':'')+'">';
      html+='<div class="ped-top"><div style="flex:1;min-width:0;">';
      html+='<div class="ped-forn">'+(p.fornecedor||"—")+'</div>';
      html+='<div class="ped-meta">'+fmtDate(p.data_pedido)+(p.numero_nf?' · NF '+p.numero_nf:'')+'</div>';
      html+='<span class="ped-forma '+formaCls+'">'+(p.forma_pagamento||"sem forma")+'</span>';
      html+='</div><div style="text-align:right;"><div class="ped-val">'+fmt(p.valor)+'</div><button class="ped-del" onclick="excluirPedido('+p.id+','+(p.lancamento_id||'null')+')">🗑️</button></div></div>';

      html+='<div class="ped-pct">'+(done?'✅ Concluído':feitos+'/'+checks.length+' · '+pct+'%')+'</div>';
      html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

      var temForma=p.forma_pagamento&&["Pix","Boleto","Dinheiro"].indexOf(p.forma_pagamento)>=0;
      if(!temForma){
        html+='<div class="forma-seletor"><div class="forma-seletor-lbl">Definir forma de pagamento:</div><div class="forma-opts">';
        html+='<button class="forma-opt" onclick="definirForma('+p.id+',\'Pix\')">Pix</button>';
        html+='<button class="forma-opt" onclick="definirForma('+p.id+',\'Boleto\')">Boleto</button>';
        html+='<button class="forma-opt" onclick="definirForma('+p.id+',\'Dinheiro\')">Dinheiro</button>';
        html+='</div></div>';
      }else{
        html+='<div class="checks">';
        checks.forEach(function(ch){
          var campo=ch[0], label=ch[1], tipoDoc=ch[2], campoUrl=ch[3];
          var on=p[campo];
          var temDoc=tipoDoc&&campoUrl;
          var url=temDoc?p[campoUrl]:null;

          html+='<div class="check-row-wrap">';
          if(temDoc){
            html+='<div class="check-row" style="cursor:default;">';
            html+='<div class="check-box '+(on?"on":"")+'">'+(on?"✓":"")+'</div>';
            html+='<div class="check-lbl '+(on?"on":"")+'" style="flex:1;">'+label+'</div>';
            if(url){
              html+='<a class="ver-link" href="'+url+'" target="_blank">Ver</a>';
            }else{
              html+='<label class="up-btn">📎 Subir<input type="file" accept="image/*,application/pdf" style="display:none" onchange="uploadDocPedido(event,'+p.id+',\''+tipoDoc+'\',\''+campoUrl+'\',\''+campo+'\')"></label>';
            }
            html+='</div>';
          }else{
            html+='<div class="check-row" onclick="toggleCheck('+p.id+',\''+campo+'\','+(!on)+')">';
            html+='<div class="check-box '+(on?"on":"")+'">'+(on?"✓":"")+'</div>';
            html+='<div class="check-lbl '+(on?"on":"")+'">'+label+'</div>';
            html+='</div>';
          }
          html+='</div>';
        });
        html+='</div>';
      }
      html+='</div>';
    });
  }
  html+='<div class="rodape">Bubble Mix Tea · Boulevard Londrina</div>';
  c.innerHTML=html;
}

async function toggleCheck(id,campo,novoValor){
  try{
    var body={};body[campo]=novoValor;
    var r=await fetch(SUPA+"/pedidos?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify(body)});
    if(!r.ok)throw new Error("Erro ao salvar "+r.status);
    render("pedidos");
  }catch(e){alert("Erro: "+e.message);}
}

async function excluirPedido(id,lancamentoId){
  var msg="Excluir este pedido? Esta ação não pode ser desfeita.";
  if(lancamentoId){
    try{
      var lr=await fetch(SUPA+"/lancamentos?id=eq."+lancamentoId+"&select=status",{headers:H});
      var ld=await lr.json();
      if(ld[0]&&ld[0].status==="Pago"){
        msg="Este pedido tem um lançamento que já consta como PAGO. Excluir vai remover também esse registro financeiro pago. Deseja continuar?";
      }
    }catch(e){}
  }
  if(!confirm(msg))return;
  try{
    if(lancamentoId){
      await fetch(SUPA+"/lancamentos?id=eq."+lancamentoId,{method:"DELETE",headers:H});
    }
    var r=await fetch(SUPA+"/pedidos?id=eq."+id,{method:"DELETE",headers:H});
    if(!r.ok)throw new Error("Erro ao excluir "+r.status);
    render("pedidos");
  }catch(e){alert("Erro: "+e.message);}
}

async function definirForma(id,forma){
  try{
    // 1. busca os dados do pedido
    var pr=await fetch(SUPA+"/pedidos?id=eq."+id+"&select=*",{headers:H});
    var pedArr=await pr.json();
    var ped=pedArr[0];
    if(!ped)throw new Error("Pedido nao encontrado");

    // 2. define forma de pagamento no pedido
    var r=await fetch(SUPA+"/pedidos?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify({forma_pagamento:forma})});
    if(!r.ok)throw new Error("Erro ao salvar forma "+r.status);

    // 3. se ainda nao tem lancamento vinculado, cria um em Contas a Pagar
    if(!ped.lancamento_id){
      var hoje=hojeISO();
      var mes=mesAtual();
      var lanc={
        data:ped.data_pedido||hoje,
        fornecedor:ped.fornecedor,
        descricao:"Pedido de compra"+(ped.itens?" - "+ped.itens:""),
        valor:ped.valor,
        competencia:ped.competencia||mes,
        status:"Em aberto",
        forma_pagamento:forma,
        linha_dre:ped.linha_dre||"CMV - Mercadorias",
        numero_nf:ped.numero_nf||null
      };
      var lr=await fetch(SUPA+"/lancamentos",{method:"POST",headers:Object.assign({},H,{Prefer:"return=representation"}),body:JSON.stringify(lanc)});
      if(!lr.ok)throw new Error("Erro ao criar lancamento "+lr.status);
      var lancCriado=await lr.json();
      var lancId=lancCriado[0].id;
      // 4. vincula o lancamento ao pedido
      await fetch(SUPA+"/pedidos?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify({lancamento_id:lancId,check_lancado_contas_pagar:true})});
    }
    render("pedidos");
  }catch(e){alert("Erro: "+e.message);}
}

async function uploadDocPedido(event,pedidoId,tipoDoc,campoUrl,campoCheck){
  var file=event.target.files[0];
  if(!file)return;
  try{
    var EDGE="https://qlcgjpaglyygnnkubxks.supabase.co/functions/v1/upload-documento";
    var pastas={nf:"NFs",boleto:"Boletos",comprovante:"Comprovantes",darf:"DARFs"};
    var fd=new FormData();
    fd.append("file",file,file.name);
    fd.append("pasta",pastas[tipoDoc]||"Geral");
    var res=await fetch(EDGE,{method:"POST",body:fd});
    if(!res.ok)throw new Error("Erro no upload "+res.status);
    var data=await res.json();
    // salva url + marca o check no pedido
    var body={};body[campoUrl]=data.url;body[campoCheck]=true;
    var r2=await fetch(SUPA+"/pedidos?id=eq."+pedidoId,{method:"PATCH",headers:H,body:JSON.stringify(body)});
    if(!r2.ok)throw new Error("Erro ao salvar "+r2.status);

    // espelha no lancamento vinculado
    var pr=await fetch(SUPA+"/pedidos?id=eq."+pedidoId+"&select=lancamento_id,numero_nf",{headers:H});
    var ped=(await pr.json())[0];
    if(ped&&ped.lancamento_id){
      var lancBody={};
      lancBody[campoUrl]=data.url; // url_nf/url_boleto/url_comprovante tambem existem em lancamentos
      if(tipoDoc==="comprovante"){
        lancBody.status="Pago";
        lancBody.data_pagamento=hojeISO();
      }
      if(tipoDoc==="nf"&&ped.numero_nf){lancBody.numero_nf=ped.numero_nf;}
      await fetch(SUPA+"/lancamentos?id=eq."+ped.lancamento_id,{method:"PATCH",headers:H,body:JSON.stringify(lancBody)});
    }
    render("pedidos");
  }catch(e){alert("Erro: "+e.message);}
}

// Etapa 1: monta a previa e mostra tela de confirmacao
async function gerarCustosFixos(){
  try{
    var mes=mesAtual();
    var fixos=await api("custos_fixos","ativo=eq.true&select=id,descricao,valor_mensal,linha_dre,tipo_valor,dia_vencimento,forma_pagamento,valor_referencia,data_referencia&order=descricao.asc");
    // anti-duplicata: custos ja gerados neste mes (por custo_fixo_id)
    var jaLanc=await api("lancamentos","competencia=eq."+encodeURIComponent(mes)+"&custo_fixo_id=not.is.null&select=custo_fixo_id");
    var jaGerado={};jaLanc.forEach(function(l){jaGerado[l.custo_fixo_id]=true;});

    // faturamento do mesmo mes do ano anterior (para presumir % )
    var fatAnt=0;
    try{
      var fr=await api("faturamento","competencia=eq."+encodeURIComponent(mesAnoAnterior())+"&select=receita_bruta");
      if(fr[0])fatAnt=Number(fr[0].receita_bruta||0);
    }catch(e){}

    // separa o que vai criar e o que vai pular
    // IDs de referencia: Royalties=14, Fundo de Marketing=24
    var vaiCriar=[],vaiPular=[];
    fixos.forEach(function(cf){
      if(jaGerado[cf.id]){vaiPular.push(cf);return;}
      var valor=null,origem="";
      if(cf.tipo_valor==="fixo"){
        valor=cf.valor_mensal?Number(cf.valor_mensal):null;
        origem=valor!=null?"cadastro":"";
      }else{
        // variavel: prioridade 1) valor_referencia aprendido  2) % conhecido  3) branco
        if(cf.valor_referencia!=null){
          valor=Number(cf.valor_referencia);
          origem="ref "+(cf.data_referencia||"");
        }else if(cf.id===24&&fatAnt>0){ // Fundo de Marketing 2%
          valor=+(fatAnt*0.02).toFixed(2);origem="2% "+mesAnoAnterior();
        }else if(cf.id===14&&fatAnt>0){ // Royalties 5%
          valor=+(fatAnt*0.05).toFixed(2);origem="5% "+mesAnoAnterior();
        }
      }
      cf._valor=valor;cf._origem=origem;cf._presumido=(origem!==""&&origem!=="cadastro");
      vaiCriar.push(cf);
    });

    // monta tela de confirmacao
    var html='<div class="modal-bg" onclick="if(event.target===this)fecharModal()"><div class="modal">';
    html+='<div class="modal-title">Gerar custos fixos · '+mes+'</div>';
    html+='<div style="font-size:12px;color:#6B7280;margin-bottom:12px;">Confira antes de criar. Presumido = estimativa pelo mesmo mês de '+mesAnoAnterior()+'.</div>';

    html+='<div style="font-size:12px;font-weight:700;color:#166534;margin-bottom:6px;">✅ Vai criar ('+vaiCriar.length+')</div>';
    vaiCriar.forEach(function(cf){
      var vtxt=cf._valor!=null?fmt(cf._valor):'<span style="color:#92400E;">em branco</span>';
      var tag=cf._presumido?' <span style="background:#FEF3C7;color:#92400E;font-size:9px;padding:1px 5px;border-radius:4px;">'+cf._origem+'</span>':'';
      html+='<div style="font-size:12px;padding:5px 0;border-bottom:1px solid #F3F4F6;">'+cf.descricao+' · <b>'+vtxt+'</b>'+tag+'</div>';
    });

    if(vaiPular.length>0){
      html+='<div style="font-size:12px;font-weight:700;color:#9CA3AF;margin:12px 0 6px;">⏭️ Vai pular — já existem ('+vaiPular.length+')</div>';
      vaiPular.forEach(function(cf){
        html+='<div style="font-size:11px;color:#9CA3AF;padding:3px 0;">'+cf.descricao+'</div>';
      });
    }

    // guarda os dados para a etapa 2
    window._custosParaGerar={mes:mes,lista:vaiCriar};

    html+='<div class="modal-btns" style="margin-top:16px;"><button class="btn-cancel" onclick="fecharModal()">Cancelar</button>';
    html+='<button class="btn-save" onclick="confirmarGerarCustosFixos()">Criar '+vaiCriar.length+'</button></div>';
    html+='</div></div>';
    var div=document.createElement("div");div.id="modal-wrap";div.innerHTML=html;document.body.appendChild(div);
  }catch(e){alert("Erro: "+e.message);}
}

// Etapa 2: confirma e cria de fato
async function confirmarGerarCustosFixos(){
  var dados=window._custosParaGerar;
  if(!dados){fecharModal();return;}
  try{
    var d=new Date();
    var criados=0;
    for(var i=0;i<dados.lista.length;i++){
      var cf=dados.lista[i];
      var dia=cf.dia_vencimento||10;
      var dataVenc=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
      var body={
        fornecedor:cf.descricao,
        descricao:cf.descricao+(cf._presumido?" (valor presumido)":""),
        valor:cf._valor,
        data:dataVenc,
        competencia:dados.mes,
        linha_dre:cf.linha_dre||null,
        codigo_bbm:cf.linha_dre||null,
        status:"Em aberto",
        forma_pagamento:cf.forma_pagamento||null,
        custo_fixo_id:cf.id
      };
      var r=await fetch(SUPA+"/lancamentos",{method:"POST",headers:H,body:JSON.stringify(body)});
      if(r.ok)criados++;
    }
    window._custosParaGerar=null;
    fecharModal();
    alert(criados+" custo(s) fixo(s) criado(s) em "+dados.mes+".");
    render("pagar");
  }catch(e){alert("Erro: "+e.message);}
}

/* ===== BAIXA DE LANCAMENTO (pagar + consolidar + multa/juros + aprender) ===== */
function abrirBaixa(id){
  var l=window._lancCache&&window._lancCache[id];
  if(!l){alert("Lançamento não encontrado");return;}
  var presumido=(l.descricao||"").toLowerCase().indexOf("valor presumido")>=0;
  var semValor=(l.valor==null||Number(l.valor)===0);
  var valorAtual=l.valor!=null?Number(l.valor):"";
  var jaPago=l.status==="Pago";

  var html='<div class="modal-bg" onclick="if(event.target===this)fecharModal()"><div class="modal">';
  html+='<div class="modal-title">'+(l.fornecedor||l.descricao||"Lançamento")+'</div>';
  html+='<div style="font-size:12px;color:#6B7280;margin-bottom:14px;">'+(l.linha_dre||"")+' · venc. '+fmtDate(l.data)+' · '+(l.competencia||"")+'</div>';

  if(jaPago){
    html+='<div style="background:#D1FAE5;color:#065F46;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:14px;">✅ Pago em '+fmtDate(l.data_pagamento)+'</div>';
  }

  // valor (editavel se presumido/sem valor)
  if(presumido||semValor){
    html+='<div class="field"><label>Valor real do boleto (R$)</label><input id="bx-valor" type="number" inputmode="decimal" value="'+valorAtual+'" placeholder="0,00"></div>';
  }else{
    html+='<div class="field"><label>Valor (R$)</label><input id="bx-valor" type="number" inputmode="decimal" value="'+valorAtual+'"></div>';
  }
  // multa/juros
  html+='<div class="field"><label>Multa / Juros por atraso (R$) — opcional</label><input id="bx-multa" type="number" inputmode="decimal" placeholder="0,00"></div>';
  // data de pagamento
  html+='<div class="field"><label>Data do pagamento</label><input id="bx-datapag" type="date" value="'+(l.data_pagamento||hojeISO())+'"></div>';
  // upload documento
  html+='<div class="field"><label>Documento (boleto / comprovante)</label>';
  if(l.url_comprovante){html+='<a class="ver-link" href="'+l.url_comprovante+'" target="_blank">Ver comprovante</a> ';}
  if(l.url_boleto){html+='<a class="ver-link" href="'+l.url_boleto+'" target="_blank">Ver boleto</a> ';}
  html+='<div style="display:flex;gap:8px;margin-top:6px;">';
  html+='<label class="up-btn">📎 Boleto<input type="file" accept="image/*,application/pdf" style="display:none" onchange="uploadDocLanc(event,'+id+',\'boleto\',\'url_boleto\')"></label>';
  html+='<label class="up-btn">📎 Comprovante<input type="file" accept="image/*,application/pdf" style="display:none" onchange="uploadDocLanc(event,'+id+',\'comprovante\',\'url_comprovante\')"></label>';
  html+='</div></div>';

  html+='<div class="modal-btns"><button class="btn-cancel" onclick="fecharModal()">Fechar</button>';
  if(!jaPago)html+='<button class="btn-save" onclick="confirmarBaixa('+id+')">Marcar Pago</button>';
  else html+='<button class="btn-save" onclick="confirmarBaixa('+id+')">Salvar</button>';
  html+='</div></div></div>';
  var div=document.createElement("div");div.id="modal-wrap";div.innerHTML=html;document.body.appendChild(div);
}

async function uploadDocLanc(event,lancId,tipoDoc,campoUrl){
  var file=event.target.files[0];
  if(!file)return;
  try{
    var EDGE="https://qlcgjpaglyygnnkubxks.supabase.co/functions/v1/upload-documento";
    var pastas={nf:"NFs",boleto:"Boletos",comprovante:"Comprovantes",darf:"DARFs"};
    var fd=new FormData();fd.append("file",file,file.name);fd.append("pasta",pastas[tipoDoc]||"Geral");
    var res=await fetch(EDGE,{method:"POST",body:fd});
    if(!res.ok)throw new Error("Erro no upload "+res.status);
    var data=await res.json();
    var body={};body[campoUrl]=data.url;
    await fetch(SUPA+"/lancamentos?id=eq."+lancId,{method:"PATCH",headers:H,body:JSON.stringify(body)});
    if(window._lancCache&&window._lancCache[lancId])window._lancCache[lancId][campoUrl]=data.url;
    alert("Documento anexado.");
  }catch(e){alert("Erro: "+e.message);}
}

async function confirmarBaixa(id){
  var l=window._lancCache&&window._lancCache[id];
  if(!l)return;
  var valor=parseFloat(document.getElementById("bx-valor").value);
  var multa=parseFloat(document.getElementById("bx-multa").value)||0;
  var dataPag=document.getElementById("bx-datapag").value;
  if(!valor||valor<=0){alert("Informe o valor");return;}
  try{
    // 1. atualiza o lancamento principal: valor real, pago, data, tira "(valor presumido)" da descricao
    var novaDesc=(l.descricao||"").replace(" (valor presumido)","");
    var body={valor:valor,status:"Pago",data_pagamento:dataPag,descricao:novaDesc};
    await fetch(SUPA+"/lancamentos?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify(body)});

    // 2. se tem multa/juros, cria lancamento separado em Financeiro - Juros e Multas
    if(multa>0){
      var lancMulta={
        data:dataPag,data_pagamento:dataPag,
        fornecedor:l.fornecedor,
        descricao:"Multa/juros - "+(l.fornecedor||l.descricao||""),
        valor:multa,competencia:l.competencia,
        linha_dre:"Financeiro - Juros e Multas",codigo_bbm:"Financeiro - Juros e Multas",
        status:"Pago",forma_pagamento:l.forma_pagamento||null
      };
      await fetch(SUPA+"/lancamentos",{method:"POST",headers:H,body:JSON.stringify(lancMulta)});
    }

    // 3. aprendizado: se tem custo_fixo_id, grava valor real como referencia
    if(l.custo_fixo_id){
      await fetch(SUPA+"/custos_fixos?id=eq."+l.custo_fixo_id,{method:"PATCH",headers:H,body:JSON.stringify({valor_referencia:valor,data_referencia:l.competencia})});
    }

    fecharModal();
    render("pagar");
  }catch(e){alert("Erro: "+e.message);}
}

/* ===== FREELANCERS ===== */
var freelAtivo=null; // nome do freelancer aberto na subpagina

async function renderPessoas(c){
  // se tem um freelancer aberto, mostra a subpagina dele
  if(freelAtivo){return renderFreelDetalhe(c,freelAtivo);}

  var frs=await api("freelancers","select=freelancer,tipo,valor,pago&order=freelancer.asc");
  // agrupa por pessoa
  var pessoas={};
  frs.forEach(function(f){
    var nome=f.freelancer||"—";
    if(!pessoas[nome])pessoas[nome]={diarias:0,vales:0,consumos:0,aPagar:0};
    var v=Number(f.valor||0);
    if(f.tipo==="diaria"){pessoas[nome].diarias+=v;if(!f.pago)pessoas[nome].aPagar+=v;}
    else if(f.tipo==="adiantamento")pessoas[nome].vales+=v;
    else if(f.tipo==="consumo")pessoas[nome].consumos+=v;
  });

  var nomes=Object.keys(pessoas).sort();
  var html='<div class="page-title">Freelancers</div><div class="page-sub">'+nomes.length+' pessoas · saldo de cada um</div>';

  if(nomes.length===0){
    html+='<div class="empty">Nenhum freelancer registrado ainda.</div>';
  }else{
    nomes.forEach(function(nome){
      var p=pessoas[nome];
      var saldo=p.diarias-p.vales-p.consumos;
      var cor,lbl,tag,tagcls;
      if(Math.abs(saldo)<0.01){cor="zero";lbl="Saldo";tag="quitado";tagcls="tag-ok";}
      else if(saldo>0){cor="deve-empresa";lbl="A empresa deve";tag="pagar ao freela";tagcls="tag-emp";}
      else{cor="deve-freela";lbl="Freela deve";tag="descontar";tagcls="tag-fre";}
      html+='<div class="fl-card" onclick="abrirFreel(\''+nome.replace(/'/g,"\\'")+'\')">';
      html+='<div class="fl-head"><div><div class="fl-nome">'+nome+'</div>';
      var resumo=[];
      if(p.diarias>0)resumo.push("diárias");
      if(p.vales>0)resumo.push("vales");
      if(p.consumos>0)resumo.push("consumo");
      html+='<div class="fl-tipo-resumo">'+(resumo.length?resumo.join(" + "):"sem lançamentos")+'</div></div>';
      html+='<div class="fl-saldo-wrap"><div class="fl-saldo-lbl">'+lbl+'</div>';
      html+='<div class="fl-saldo '+cor+'">'+fmt(Math.abs(saldo))+'</div>';
      html+='<span class="fl-saldo-tag '+tagcls+'">'+tag+'</span></div>';
      html+='</div></div>';
    });
  }
  html+='<div class="rodape">Bubble Mix Tea · Boulevard Londrina</div>';
  c.innerHTML=html;
}

function abrirFreel(nome){freelAtivo=nome;render("pessoas");}
function voltarFreel(){freelAtivo=null;render("pessoas");}

async function renderFreelDetalhe(c,nome){
  var frs=await api("freelancers","freelancer=eq."+encodeURIComponent(nome)+"&select=*&order=data.asc");
  var diarias=frs.filter(function(f){return f.tipo==="diaria";});
  var consumos=frs.filter(function(f){return f.tipo==="consumo";});
  var vales=frs.filter(function(f){return f.tipo==="adiantamento";});
  var totDiarias=diarias.reduce(function(s,f){return s+Number(f.valor||0);},0);
  var totConsumos=consumos.reduce(function(s,f){return s+Number(f.valor||0);},0);
  var totVales=vales.reduce(function(s,f){return s+Number(f.valor||0);},0);
  var aPagar=diarias.filter(function(f){return !f.pago;}).reduce(function(s,f){return s+Number(f.valor||0);},0);
  var saldo=totDiarias-totConsumos-totVales;

  var html='<div class="fl-back" onclick="voltarFreel()">← Freelancers</div>';
  html+='<div class="page-title">'+nome+'</div><div class="page-sub">saldo líquido e movimentações</div>';

  // botoes separados
  html+='<div class="fl-btns">';
  html+='<button class="fl-btn-d" onclick="modalFreel(\''+nome.replace(/'/g,"\\'")+'\',\'diaria\')">+ Diária</button>';
  html+='<button class="fl-btn-a" onclick="modalFreel(\''+nome.replace(/'/g,"\\'")+'\',\'adiantamento\')">+ Vale</button>';
  html+='<button class="fl-btn-c" onclick="modalFreel(\''+nome.replace(/'/g,"\\'")+'\',\'consumo\')">+ Consumo</button>';
  html+='</div>';

  // SECAO 1: DIARIAS
  html+=secaoFreel("Diárias","mt-d",diarias,totDiarias,"+",aPagar);
  // SECAO 2: CONSUMO
  html+=secaoFreel("Consumo","mt-c",consumos,totConsumos,"−",null);
  // SECAO 3: ADIANTAMENTOS
  html+=secaoFreel("Adiantamentos (vales)","mt-a",vales,totVales,"−",null);

  // TOTAL LIQUIDO
  var cor=Math.abs(saldo)<0.01?"zero":(saldo>0?"deve-empresa":"deve-freela");
  var txt=Math.abs(saldo)<0.01?"Quitado":(saldo>0?"A empresa deve ao freela":"Freela deve à loja");
  html+='<div class="fl-total"><div class="fl-total-formula">Diárias <b>'+fmt(totDiarias)+'</b> − Consumo <b>'+fmt(totConsumos)+'</b> − Vales <b>'+fmt(totVales)+'</b></div>';
  html+='<div class="fl-total-val '+cor+'">'+fmt(Math.abs(saldo))+'</div><div class="fl-total-lbl">'+txt+'</div></div>';

  html+='<div class="rodape">Bubble Mix Tea · Boulevard Londrina</div>';
  c.innerHTML=html;
}

function secaoFreel(titulo,mtcls,itens,total,sinal,aPagar){
  var h='<div class="fl-secao"><div class="fl-secao-head"><span class="fl-secao-tit">'+titulo+'</span><span class="fl-secao-tot">'+sinal+fmt(total)+'</span></div>';
  if(itens.length===0){
    h+='<div class="fl-vazio">sem lançamentos</div>';
  }else{
    itens.forEach(function(f){
      var pagoChip="";
      if(f.tipo==="diaria")pagoChip=f.pago?'<span class="pago-chip pg-sim">ok</span>':'<span class="pago-chip pg-nao">a pagar</span>';
      h+='<div class="fl-linha" onclick="modalEditFreel('+f.id+')">';
      h+='<div><div class="fl-linha-desc">'+(f.descricao||titulo)+'</div><div class="fl-linha-data">'+fmtDate(f.data)+' · '+(f.competencia||"")+'</div></div>';
      h+='<div class="fl-linha-dir"><span class="fl-linha-val">'+sinal+fmt(f.valor)+'</span>'+pagoChip+'</div>';
      h+='</div>';
    });
  }
  if(aPagar!=null&&aPagar>0){
    h+='<div class="fl-apagar">A pagar: <b>'+fmt(aPagar)+'</b></div>';
  }
  h+='</div>';
  return h;
}

// cache p/ editar
var _freelCache={};
function modalFreel(nome,tipo){
  var hoje=hojeISO();
  var titulos={diaria:"Registrar Diária",adiantamento:"Registrar Vale (adiantamento)",consumo:"Registrar Consumo"};
  var html='<div class="modal-bg" onclick="if(event.target===this)fecharModal()"><div class="modal">';
  html+='<div class="modal-title">'+titulos[tipo]+' · '+nome+'</div>';
  if(tipo==="consumo"){
    html+='<div style="font-size:12px;color:#6B7280;margin-bottom:12px;">Informe o valor de venda do que foi consumido. O sistema cobra 40% disso (neutraliza o CMV).</div>';
    html+='<div class="field"><label>Valor de venda (R$)</label><input id="ff-pv" type="number" inputmode="decimal" placeholder="0,00" oninput="calc40()"></div>';
    html+='<div class="field"><label>Valor cobrado (40%)</label><input id="ff-valor" type="number" readonly style="background:#F9FAFB;"></div>';
  }else{
    html+='<div class="field"><label>Valor (R$)</label><input id="ff-valor" type="number" inputmode="decimal" placeholder="0,00"></div>';
  }
  html+='<div class="field"><label>Data</label><input id="ff-data" type="date" value="'+hoje+'"></div>';
  html+='<div class="field"><label>Descrição (opcional)</label><input id="ff-desc" type="text" placeholder="ex: '+(tipo==="consumo"?"lanche":"diária")+'"></div>';
  html+='<div class="modal-btns"><button class="btn-cancel" onclick="fecharModal()">Cancelar</button><button class="btn-save" onclick="salvarFreel(\''+nome.replace(/'/g,"\\'")+'\',\''+tipo+'\')">Registrar</button></div>';
  html+='</div></div>';
  var div=document.createElement("div");div.id="modal-wrap";div.innerHTML=html;document.body.appendChild(div);
}

function calc40(){
  var pv=parseFloat(document.getElementById("ff-pv").value)||0;
  document.getElementById("ff-valor").value=(pv*0.4).toFixed(2);
}

async function salvarFreel(nome,tipo){
  var valor=parseFloat(document.getElementById("ff-valor").value);
  var data=document.getElementById("ff-data").value;
  var desc=document.getElementById("ff-desc").value.trim();
  if(!valor||valor<=0){alert("Informe um valor válido");return;}
  if(!data){alert("Informe a data");return;}
  try{
    var mes=mesAtual();
    var body={freelancer:nome,tipo:tipo,valor:valor,data:data,competencia:mes,
      descricao:desc||(tipo==="diaria"?"Diária":tipo==="consumo"?"Consumo":"Vale")+" "+fmtDate(data),
      pago:tipo!=="diaria"};// vale e consumo ja saem como "pago"/efetivados; diaria nasce a pagar
    var r=await fetch(SUPA+"/freelancers",{method:"POST",headers:H,body:JSON.stringify(body)});
    if(!r.ok)throw new Error("Erro ao registrar "+r.status);

    // vale (adiantamento) sai do caixa -> vira lancamento em Contas a Pagar
    if(tipo==="adiantamento"){
      var lanc={data:data,data_pagamento:data,fornecedor:nome,descricao:"Vale/adiantamento - "+nome,
        valor:valor,competencia:mes,linha_dre:"Pessoal - Folguista",codigo_bbm:"Pessoal - Folguista",
        status:"Pago",forma_pagamento:"Dinheiro"};
      await fetch(SUPA+"/lancamentos",{method:"POST",headers:H,body:JSON.stringify(lanc)});
    }
    fecharModal();
    render("pessoas");
  }catch(e){alert("Erro: "+e.message);}
}

async function modalEditFreel(id){
  try{
    var arr=await api("freelancers","id=eq."+id+"&select=*");
    var f=arr[0];if(!f){alert("Não encontrado");return;}
    var html='<div class="modal-bg" onclick="if(event.target===this)fecharModal()"><div class="modal">';
    html+='<div class="modal-title">'+(f.descricao||"Lançamento")+'</div>';
    html+='<div style="font-size:12px;color:#6B7280;margin-bottom:12px;">'+f.tipo+' · '+fmtDate(f.data)+' · '+fmt(f.valor)+'</div>';
    if(f.tipo==="diaria"){
      if(!f.pago)html+='<button class="btn-save" style="width:100%;margin-bottom:10px;" onclick="marcarPagoFreel('+id+')">Marcar como paga</button>';
      else html+='<div style="background:#D1FAE5;color:#065F46;padding:10px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:10px;text-align:center;">✅ Diária paga</div>';
    }
    html+='<button class="btn-cancel" style="width:100%;" onclick="excluirFreel('+id+')">🗑️ Excluir lançamento</button>';
    html+='<div class="modal-btns" style="margin-top:10px;"><button class="btn-cancel" onclick="fecharModal()">Fechar</button></div>';
    html+='</div></div>';
    var div=document.createElement("div");div.id="modal-wrap";div.innerHTML=html;document.body.appendChild(div);
  }catch(e){alert("Erro: "+e.message);}
}

async function marcarPagoFreel(id){
  try{
    await fetch(SUPA+"/freelancers?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify({pago:true,data_pagamento:hojeISO()})});
    fecharModal();render("pessoas");
  }catch(e){alert("Erro: "+e.message);}
}

async function excluirFreel(id){
  if(!confirm("Excluir este lançamento?"))return;
  try{
    await fetch(SUPA+"/freelancers?id=eq."+id,{method:"DELETE",headers:H});
    fecharModal();render("pessoas");
  }catch(e){alert("Erro: "+e.message);}
}
